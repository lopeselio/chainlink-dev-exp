# ============================================================================
# CRE secrets TEMPLATE — safe to commit. Contains NO real secret values.
# ============================================================================
# This workflow needs no secrets: the price is read on-chain via the EVM Read
# capability and the RPC URL lives in project.yaml. The block below shows the
# expected shape if you ever add one (e.g. an API key for an HTTP capability).
#
# `secretsNames` maps a logical secret id to the per-node environment variable
# name(s) that hold the value. Real values are provided out-of-band (env / CRE
# secrets manager) and are never stored in this file.

secretsNames: {}
# Example:
# secretsNames:
#   API_KEY:
#     - API_KEY_NODE_1
#     - API_KEY_NODE_2
